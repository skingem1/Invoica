name: Publish @invoica/sdk

# Triggered by: git tag sdk-vX.Y.Z && git push origin sdk-vX.Y.Z
#
# AUTH:  Granular Access Token stored as NPM_TOKEN repo secret.
#        Same token as publish-mcp.yml — ensure it covers @invoica/sdk too.
#
# PROVENANCE: Sigstore attestation links tarball to exact commit + workflow run.
#        Verifiable with: npm audit signatures @invoica/sdk

on:
  push:
    tags:
      - 'sdk-v*'

permissions:
  id-token: write   # required for Sigstore provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --prefix sdk

      - name: Build SDK
        run: npm run build --prefix sdk

      - name: Publish to npm
        run: npm publish sdk/ --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
