name: Publish invoica-mcp

# Triggered by: git tag npm-vX.Y.Z && git push origin npm-vX.Y.Z
#
# AUTH:  npm Automation token stored as NPM_TOKEN repo secret.
#        Automation tokens bypass 2FA (unlike classic Publish tokens).
#        Create one at: https://www.npmjs.com/settings/<user>/tokens
#        → Generate New Token → Granular Access Token → type: Automation
#
# PROVENANCE: id-token: write lets GitHub issue an OIDC JWT so npm can
#        attach a Sigstore attestation to the package — permanently links
#        this tarball to the exact commit + workflow run.  Verifiable with:
#        npm audit signatures invoica-mcp
#
# NOTE: npm does not (yet) support fully tokenless auth via OIDC the way
#        PyPI's Trusted Publishers does. Provenance uses OIDC for signing;
#        auth still requires an Automation token in NPM_TOKEN.

on:
  push:
    tags:
      - 'npm-v*'

permissions:
  id-token: write   # required for Sigstore provenance attestation
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Compile MCP server
        run: npx tsc -p tsconfig.mcp.json

      - name: Build mcp-package/index.js
        run: |
          printf '#!/usr/bin/env node\n' > mcp-package/index.js
          cat dist/mcp/invoica-mcp-server.js >> mcp-package/index.js
          chmod +x mcp-package/index.js

      - name: Publish to npm (Automation token + Sigstore provenance)
        run: npm publish mcp-package/ --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
