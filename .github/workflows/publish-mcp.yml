name: Publish invoica-mcp

# Triggered by: git tag npm-vX.Y.Z && git push origin npm-vX.Y.Z
#
# AUTH:  npm Trusted Publishers (tokenless OIDC) — no NPM_TOKEN secret needed.
#        Setup (one-time, manual on npmjs.com):
#          1. Go to: https://www.npmjs.com/package/invoica-mcp → Settings → Publishing
#          2. Add Trusted Publisher → GitHub Actions
#          3. Fill in:
#             - GitHub organization/user: skingem1
#             - Repository:              Invoica
#             - Workflow filename:       publish-mcp.yml
#          After saving, this workflow authenticates via OIDC with zero stored secrets.
#
# REQUIREMENTS:
#        - npm CLI ≥ 11.5.1  (Node 24 ships with it)
#        - GitHub-hosted runner (OIDC token only issued by GitHub-hosted runners)
#        - id-token: write permission (below)
#
# PROVENANCE: id-token: write also lets GitHub issue an OIDC JWT so npm can
#        attach a Sigstore attestation to the package — permanently links
#        this tarball to the exact commit + workflow run.  Verifiable with:
#        npm audit signatures invoica-mcp

on:
  push:
    tags:
      - 'npm-v*'

permissions:
  id-token: write   # required for both Trusted Publishers auth AND Sigstore provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'              # npm CLI ≥11.5.1 — required for Trusted Publishers
          registry-url: 'https://registry.npmjs.org'

      - name: Install MCP compile dependencies
        # Install only what the MCP server actually needs — avoids the full
        # backend lockfile (bcrypt, prisma, viem…) which fails in CI
        run: npm install --no-save --ignore-scripts typescript @modelcontextprotocol/sdk @types/node

      - name: Compile MCP server
        run: npx tsc -p tsconfig.mcp.json

      - name: Build mcp-package/index.js
        run: |
          printf '#!/usr/bin/env node\n' > mcp-package/index.js
          cat dist/mcp/invoica-mcp-server.js >> mcp-package/index.js
          chmod +x mcp-package/index.js

      - name: Publish to npm (Trusted Publishers OIDC + Sigstore provenance)
        run: npm publish mcp-package/ --provenance --access public
        # No NODE_AUTH_TOKEN — npm CLI auto-detects OIDC environment via Trusted Publishers
