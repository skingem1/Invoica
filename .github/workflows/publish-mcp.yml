name: Publish invoica-mcp

on:
  push:
    tags:
      - 'npm-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Compile MCP server
        run: npx tsc -p tsconfig.mcp.json
      - name: Build mcp-package/index.js (add shebang + compiled output)
        run: |
          printf '#!/usr/bin/env node\n' > mcp-package/index.js
          cat dist/mcp/invoica-mcp-server.js >> mcp-package/index.js
          chmod +x mcp-package/index.js
      - name: Debug — npm auth check
        run: |
          echo "Node version: $(node -v)"
          echo "npm version: $(npm -v)"
          npm whoami --registry https://registry.npmjs.org 2>&1 || echo "⚠️  npm whoami failed — check NPM_TOKEN"
          echo "mcp-package contents:"
          ls -la mcp-package/
          echo "index.js first line:"
          head -1 mcp-package/index.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        working-directory: mcp-package
        run: npm publish 2>&1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
