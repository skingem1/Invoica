name: Publish invoica-mcp

# Triggered by: git tag npm-vX.Y.Z && git push origin npm-vX.Y.Z
#
# REQUIRES: An npm "Automation" token (not a classic "Publish" token).
#   If your npm account has 2FA enabled, classic tokens will fail on `npm publish`
#   even though `npm whoami` and dry-run succeed.
#   Create an Automation token at: https://www.npmjs.com/settings/<user>/tokens
#   Then update the NPM_TOKEN secret in GitHub repo Settings → Secrets.

on:
  push:
    tags:
      - 'npm-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Compile MCP server
        run: npx tsc -p tsconfig.mcp.json

      - name: Build mcp-package/index.js
        run: |
          printf '#!/usr/bin/env node\n' > mcp-package/index.js
          cat dist/mcp/invoica-mcp-server.js >> mcp-package/index.js
          chmod +x mcp-package/index.js

      - name: Publish to npm
        run: npm publish mcp-package/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
